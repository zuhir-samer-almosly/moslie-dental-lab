version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moslie-dental-lab-local
    restart: unless-stopped
    working_dir: /opt/dental-lab/moslie-dental-lab
    volumes:
      # Mount the whole code directory for hot-reloading & easy local debugging
      - .:/opt/dental-lab/moslie-dental-lab
      # Use anonymous volumes to prevent local host folders from overwriting
      # container-side vendor and node_modules built in the Dockerfile
      - /opt/dental-lab/moslie-dental-lab/vendor
      - /opt/dental-lab/moslie-dental-lab/node_modules
      - /opt/dental-lab/moslie-dental-lab/public/build
      - ./storage:/opt/dental-lab/moslie-dental-lab/storage
      - ./bootstrap/cache:/opt/dental-lab/moslie-dental-lab/bootstrap/cache
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-zoher}
      - DB_USERNAME=${DB_USERNAME:-zoher}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - APP_URL=http://dental.test
    ports:
      # Serve on http://dental.test (add "127.0.0.1 dental.test" to your hosts file)
      - "127.0.0.1:${APP_PORT:-80}:80"
    depends_on:
      - db
      - redis
    networks:
      - moslie-network

  # Vite dev server — gives instant hot-reload for frontend (.tsx/.css) changes.
  # It writes public/hot (shared via the code mount) so Laravel's @vite directive
  # points the browser at this dev server instead of the pre-built assets.
  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moslie-vite-local
    restart: unless-stopped
    working_dir: /opt/dental-lab/moslie-dental-lab
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_DOCKER=true
      # HMR client (in the browser) connects back to the dev server via this host
      - VITE_HMR_HOST=dental.test
    volumes:
      - .:/opt/dental-lab/moslie-dental-lab
      # Keep the container's node_modules and vendor (installed at image build)
      # intact — the host copies are built for a different PHP/arch and would
      # break artisan (which Wayfinder runs to generate route helpers).
      - /opt/dental-lab/moslie-dental-lab/node_modules
      - /opt/dental-lab/moslie-dental-lab/vendor
    ports:
      - "127.0.0.1:5173:5173"
    networks:
      - moslie-network

  db:
    image: mysql:8.0
    container_name: moslie-db-local
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-zoher}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-zoher}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-local-data:/var/lib/mysql
    ports:
      # TODO(security): Bind to localhost (127.0.0.1) to avoid exposing MySQL publicly
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    networks:
      - moslie-network

  redis:
    image: redis:7-alpine
    container_name: moslie-redis-local
    restart: unless-stopped
    ports:
      # TODO(security): Bind to localhost (127.0.0.1) to avoid exposing Redis publicly
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - moslie-network

volumes:
  db-local-data:
    driver: local

networks:
  moslie-network:
    driver: bridge
