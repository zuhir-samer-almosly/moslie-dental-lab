version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: moslie-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - moslie-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moslie-dental-lab
    restart: unless-stopped
    working_dir: /opt/dental-lab/moslie-dental-lab
    volumes:
      # .env is excluded from the image via .dockerignore, so mount it in.
      # Laravel reads APP_KEY/APP_URL/etc. from here at runtime. Must exist on
      # the host before `up` (cp .env.docker .env) or Docker creates a dir.
      - ./.env:/opt/dental-lab/moslie-dental-lab/.env
      - ./storage:/opt/dental-lab/moslie-dental-lab/storage
      - ./bootstrap/cache:/opt/dental-lab/moslie-dental-lab/bootstrap/cache
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-zoher}
      - DB_USERNAME=${DB_USERNAME:-zoher}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    expose:
      - "80"
    depends_on:
      - db
      - redis
    networks:
      - moslie-network

  db:
    image: mysql:8.0
    container_name: moslie-db
    restart: unless-stopped
    # Use the classic auth plugin so the (MariaDB-based) mysqldump client in
    # the app image can connect for nightly backups. MySQL 8's default
    # caching_sha2_password isn't supported by that client over a plain
    # (non-TLS) internal connection.
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-zoher}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-zoher}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    # Not published to the host: the app reaches MySQL over the internal
    # moslie-network. Docker bypasses UFW, so publishing this would expose
    # the database to the internet on a public VPS. Uncomment the 127.0.0.1
    # binding below only if you need local host access (never use 0.0.0.0).
    # ports:
    #   - "127.0.0.1:${DB_PORT:-3306}:3306"
    networks:
      - moslie-network

  redis:
    image: redis:7-alpine
    container_name: moslie-redis
    restart: unless-stopped
    # Not published to the host: Redis has no password, so exposing it on a
    # public VPS = unauthenticated remote access. The app reaches it over the
    # internal moslie-network. Uncomment the 127.0.0.1 binding below only if
    # you need local host access (never use 0.0.0.0).
    # ports:
    #   - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - moslie-network

volumes:
  db-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  moslie-network:
    driver: bridge
